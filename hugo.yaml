baseurl: https://yubailing666.github.io
languageCode: zh-cn
theme: hugo-theme-stack-3.34.2
title: 余佰凌的空间
copyright: 余佰凌

DefaultContentLanguage: zh-cn
hasCJKLanguage: true

languages:
    zh-cn:
        languageName: 简体中文
        title: 余佰凌的空间
        weight: 1
        params:
            sidebar:
                subtitle: 淋点雨，清醒点

pagination:
    pagerSize: 10

permalinks:
    post: /p/:slug/
    page: /:slug/

params:
    mainSections:
        - post
    featuredImageField: image
    rssFullContent: true

    footer:
        since: 2026
        customText:

    dateFormat:
        published: 2006-01-02
        lastUpdated: 2006-01-02 15:04

    sidebar:
        emoji: 🌧️
        subtitle: 淋点雨，清醒点
        avatar:
            enabled: false
            local: true
            src: img/avatar.png

    article:
        math: true
        toc: true
        readingTime: true
        license:
            enabled: true
            default: CC BY-NC-SA 4.0

    comments:
        enabled: false

    widgets:
        homepage:
            - type: search
            - type: archives
              params:
                  limit: 5
            - type: categories
              params:
                  limit: 10
            - type: tag-cloud
              params:
                  limit: 10
        page:
            - type: toc

    colorScheme:
        toggle: true
        default: auto

    imageProcessing:
        cover:
            enabled: true
        content:
            enabled: true

menu:
    main:
        - identifier: home
          name: 首页
          url: /
          weight: 1
          params:
              icon: home
        - identifier: archives
          name: 归档
          url: /archives/
          weight: 2
          params:
              icon: archives
        - identifier: search
          name: 搜索
          url: /search/
          weight: 3
          params:
              icon: search
        - identifier: about
          name: 关于
          url: /about/
          weight: 4
          params:
              icon: user

related:
    includeNewer: true
    threshold: 60
    toLower: false
    indices:
        - name: tags
          weight: 100
        - name: categories
          weight: 200

markup:
    goldmark:
        extensions:
            passthrough:
                enable: true
                delimiters:
                    block:
                        - - \[
                          - \]
                        - - $$
                          - $$
                    inline:
                        - - \(
                          - \)
                        - - $
                          - $
        renderer:
            unsafe: true
    tableOfContents:
        endLevel: 4
        ordered: true
        startLevel: 2
    highlight:
        noClasses: false
        codeFences: true
        guessSyntax: true
        lineNoStart: 1
        lineNos: true
        lineNumbersInTable: true
        tabWidth: 4
